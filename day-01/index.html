<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      color: #a78bfa;
      margin-bottom: 0.5rem;
    }

    .name {
      font-size: 1.5rem;
      color: #c4b5fd;
      margin-bottom: 0.5rem;
    }

    .date {
      font-size: 1rem;
      color: #9ca3af;
      margin-bottom: 2rem;
    }

    h2 {
      font-size: 1.3rem;
      color: #a78bfa;
      margin-bottom: 1rem;
    }

    ul {
      list-style: none;
      display: inline-block;
      text-align: left;
    }

    ul li {
      padding: 0.5rem 0;
      font-size: 1.1rem;
      color: #d1d5db;
    }

    ul li::before {
      content: "→ ";
      color: #a78bfa;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, World!</h1>
    <p class="name">Lourenzo</p>
    <p class="date">March 21, 2026</p>
    <h2>3 Things I Want to Learn About AI</h2>
    <ul>
      <li>How large language models work under the hood</li>
      <li>Building real-world AI-powered applications</li>
      <li>Prompt engineering and AI agent design</li>
    </ul>
  </div>
</body>
</html>
