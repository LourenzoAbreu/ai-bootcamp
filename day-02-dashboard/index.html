<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Dashboard</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e334d;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #6366f1;
      --accent-h:  #818cf8;
      --danger:    #ef4444;
      --success:   #22c55e;
      --warn:      #f59e0b;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 860px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -.5px;
      color: var(--text);
    }

    header h1 span { color: var(--accent); }

    #clock {
      font-size: .9rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* ── Main Grid ── */
    main {
      width: 100%;
      max-width: 860px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 620px) {
      main { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* ── Pomodoro ── */
    #pomodoro { display: flex; flex-direction: column; align-items: center; gap: 16px; }

    .mode-tabs {
      display: flex;
      gap: 8px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 4px;
      width: 100%;
    }

    .mode-tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-size: .8rem;
      font-weight: 600;
      padding: 6px 0;
      border-radius: 6px;
      cursor: pointer;
      transition: background .2s, color .2s;
    }

    .mode-tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* SVG Ring */
    .ring-wrap {
      position: relative;
      width: 170px;
      height: 170px;
    }

    .ring-wrap svg { transform: rotate(-90deg); }

    .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }

    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset .5s linear, stroke .3s;
    }

    .ring-time {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #timer-display {
      font-size: 2.6rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
      line-height: 1;
    }

    #timer-label {
      font-size: .7rem;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .timer-controls { display: flex; gap: 10px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      padding: 9px 20px;
    }

    .btn:active { transform: scale(.97); }
    .btn:hover  { opacity: .88; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost   { background: var(--surface2); color: var(--text); }
    .btn-sm      { padding: 6px 14px; font-size: .78rem; }

    #pomo-count {
      font-size: .78rem;
      color: var(--muted);
    }

    #pomo-count span { color: var(--warn); font-weight: 700; }

    /* ── Tasks ── */
    #task-panel { display: flex; flex-direction: column; gap: 14px; }

    .task-input-row {
      display: flex;
      gap: 8px;
    }

    .task-input-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .88rem;
      padding: 9px 14px;
      outline: none;
      transition: border-color .2s;
    }

    .task-input-row input:focus { border-color: var(--accent); }
    .task-input-row input::placeholder { color: var(--muted); }

    /* Stats row */
    .task-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .75rem;
      color: var(--muted);
    }

    .task-stats button {
      background: none;
      border: none;
      color: var(--danger);
      font-size: .75rem;
      cursor: pointer;
      padding: 0;
    }

    .task-stats button:hover { text-decoration: underline; }

    /* List */
    #task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 340px;
      overflow-y: auto;
      padding-right: 4px;
    }

    #task-list::-webkit-scrollbar { width: 4px; }
    #task-list::-webkit-scrollbar-track { background: transparent; }
    #task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      animation: slideIn .2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-check {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s, background .2s;
    }

    .task-check:hover { border-color: var(--success); }

    .task-item.done .task-check {
      background: var(--success);
      border-color: var(--success);
    }

    .task-item.done .task-check::after {
      content: "";
      width: 5px;
      height: 8px;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(45deg) translate(-1px,-1px);
      display: block;
    }

    .task-text {
      flex: 1;
      font-size: .88rem;
      line-height: 1.4;
      word-break: break-word;
      transition: color .2s;
    }

    .task-item.done .task-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color .15s;
      flex-shrink: 0;
    }

    .task-del:hover { color: var(--danger); }

    .empty-msg {
      text-align: center;
      color: var(--muted);
      font-size: .85rem;
      padding: 24px 0;
    }

    /* ── Notification badge ── */
    #notif {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #fff;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: .85rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(99,102,241,.5);
      transition: transform .3s ease;
      z-index: 999;
      white-space: nowrap;
    }

    #notif.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <header>
    <h1>Focus<span>.</span></h1>
    <div id="clock"></div>
  </header>

  <main>

    <!-- ── Pomodoro Card ── -->
    <div class="card">
      <div class="card-title">Pomodoro Timer</div>

      <div id="pomodoro">

        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="work">Work</button>
          <button class="mode-tab" data-mode="break">Break</button>
        </div>

        <div class="ring-wrap">
          <svg width="170" height="170" viewBox="0 0 170 170">
            <circle class="ring-bg" cx="85" cy="85" r="78"/>
            <circle class="ring-progress" id="ring" cx="85" cy="85" r="78"
              stroke-dasharray="490"
              stroke-dashoffset="0"/>
          </svg>
          <div class="ring-time">
            <div id="timer-display">25:00</div>
            <div id="timer-label">Focus</div>
          </div>
        </div>

        <div class="timer-controls">
          <button class="btn btn-primary" id="start-btn">Start</button>
          <button class="btn btn-ghost" id="reset-btn">Reset</button>
        </div>

        <div id="pomo-count">Sessions today: <span id="pomo-num">0</span></div>

      </div>
    </div>

    <!-- ── Tasks Card ── -->
    <div class="card">
      <div class="card-title">Tasks</div>

      <div id="task-panel">
        <div class="task-input-row">
          <input type="text" id="task-input" placeholder="Add a task…" maxlength="120" />
          <button class="btn btn-primary btn-sm" id="add-btn">Add</button>
        </div>

        <div class="task-stats">
          <span id="task-count">0 tasks</span>
          <button id="clear-done">Clear done</button>
        </div>

        <ul id="task-list"></ul>
      </div>
    </div>

  </main>

  <div id="notif"></div>

  <script>
    /* ═══════════════════════════════
       CLOCK
    ═══════════════════════════════ */
    const clockEl = document.getElementById("clock");
    function updateClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }
    updateClock();
    setInterval(updateClock, 1000);


    /* ═══════════════════════════════
       NOTIFICATION TOAST
    ═══════════════════════════════ */
    let notifTimer;
    function showNotif(msg) {
      const el = document.getElementById("notif");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(notifTimer);
      notifTimer = setTimeout(() => el.classList.remove("show"), 3000);
    }


    /* ═══════════════════════════════
       POMODORO
    ═══════════════════════════════ */
    const MODES = { work: 25 * 60, break: 5 * 60 };
    const CIRCUMFERENCE = 490; // 2π * 78 ≈ 490

    let pomState = {
      mode:      "work",
      remaining: MODES.work,
      running:   false,
      sessions:  parseInt(localStorage.getItem("pomo_sessions") || "0"),
      interval:  null,
    };

    const timerDisplay = document.getElementById("timer-display");
    const timerLabel   = document.getElementById("timer-label");
    const ring         = document.getElementById("ring");
    const startBtn     = document.getElementById("start-btn");
    const resetBtn     = document.getElementById("reset-btn");
    const pomoNum      = document.getElementById("pomo-num");

    function formatTime(s) {
      const m = Math.floor(s / 60).toString().padStart(2, "0");
      const sec = (s % 60).toString().padStart(2, "0");
      return `${m}:${sec}`;
    }

    function updateRing() {
      const total    = MODES[pomState.mode];
      const fraction = pomState.remaining / total;
      ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
      ring.style.stroke = pomState.mode === "work" ? "var(--accent)" : "var(--success)";
    }

    function renderTimer() {
      timerDisplay.textContent = formatTime(pomState.remaining);
      timerLabel.textContent   = pomState.mode === "work" ? "Focus" : "Break";
      pomoNum.textContent      = pomState.sessions;
      updateRing();
      document.title = `${formatTime(pomState.remaining)} · Focus`;
    }

    function tick() {
      if (pomState.remaining <= 0) {
        clearInterval(pomState.interval);
        pomState.running = false;
        startBtn.textContent = "Start";

        if (pomState.mode === "work") {
          pomState.sessions++;
          localStorage.setItem("pomo_sessions", pomState.sessions);
          showNotif("🎉 Session done! Time for a break.");
          switchMode("break");
        } else {
          showNotif("Break over — back to work!");
          switchMode("work");
        }
        return;
      }
      pomState.remaining--;
      renderTimer();
    }

    function switchMode(mode) {
      pomState.mode      = mode;
      pomState.remaining = MODES[mode];
      pomState.running   = false;
      clearInterval(pomState.interval);
      startBtn.textContent = "Start";

      document.querySelectorAll(".mode-tab").forEach(t =>
        t.classList.toggle("active", t.dataset.mode === mode)
      );
      renderTimer();
    }

    startBtn.addEventListener("click", () => {
      if (pomState.running) {
        clearInterval(pomState.interval);
        pomState.running = false;
        startBtn.textContent = "Resume";
      } else {
        pomState.running = true;
        startBtn.textContent = "Pause";
        pomState.interval = setInterval(tick, 1000);
      }
    });

    resetBtn.addEventListener("click", () => {
      clearInterval(pomState.interval);
      pomState.remaining = MODES[pomState.mode];
      pomState.running   = false;
      startBtn.textContent = "Start";
      renderTimer();
    });

    document.querySelectorAll(".mode-tab").forEach(tab => {
      tab.addEventListener("click", () => switchMode(tab.dataset.mode));
    });

    renderTimer();


    /* ═══════════════════════════════
       TASKS
    ═══════════════════════════════ */
    let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");

    const taskInput  = document.getElementById("task-input");
    const addBtn     = document.getElementById("add-btn");
    const taskList   = document.getElementById("task-list");
    const taskCount  = document.getElementById("task-count");
    const clearDone  = document.getElementById("clear-done");

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function renderTasks() {
      taskList.innerHTML = "";

      if (tasks.length === 0) {
        taskList.innerHTML = `<li class="empty-msg">No tasks yet — add one above.</li>`;
      } else {
        tasks.forEach((t, i) => {
          const li = document.createElement("li");
          li.className = "task-item" + (t.done ? " done" : "");

          const check = document.createElement("div");
          check.className = "task-check";
          check.title = t.done ? "Mark incomplete" : "Mark complete";
          check.addEventListener("click", () => toggleTask(i));

          const text = document.createElement("span");
          text.className = "task-text";
          text.textContent = t.text;

          const del = document.createElement("button");
          del.className = "task-del";
          del.innerHTML = "&#x2715;";
          del.title = "Delete";
          del.addEventListener("click", () => deleteTask(i));

          li.appendChild(check);
          li.appendChild(text);
          li.appendChild(del);
          taskList.appendChild(li);
        });
      }

      const total = tasks.length;
      const done  = tasks.filter(t => t.done).length;
      taskCount.textContent = total === 0
        ? "0 tasks"
        : `${done}/${total} done`;
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;
      tasks.unshift({ text, done: false, id: Date.now() });
      saveTasks();
      renderTasks();
      taskInput.value = "";
      taskInput.focus();
    }

    function toggleTask(i) {
      tasks[i].done = !tasks[i].done;
      saveTasks();
      renderTasks();
    }

    function deleteTask(i) {
      tasks.splice(i, 1);
      saveTasks();
      renderTasks();
    }

    addBtn.addEventListener("click", addTask);
    taskInput.addEventListener("keydown", e => { if (e.key === "Enter") addTask(); });

    clearDone.addEventListener("click", () => {
      const before = tasks.length;
      tasks = tasks.filter(t => !t.done);
      if (tasks.length < before) {
        saveTasks();
        renderTasks();
        showNotif("Cleared completed tasks.");
      }
    });

    renderTasks();
  </script>
</body>
</html>
