<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 24px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .stats {
      font-size: 0.875rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    .input-area {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area button {
      padding: 10px 18px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .filters {
      padding: 12px 16px;
      display: flex;
      gap: 6px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      padding: 5px 12px;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      background: white;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #4f46e5;
      color: white;
      border-color: #4f46e5;
    }

    .todo-list {
      list-style: none;
      min-height: 60px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f3f4f6;
      gap: 12px;
      transition: background 0.15s;
    }

    .todo-item:hover {
      background: #f9fafb;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      word-break: break-word;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #ef4444;
    }

    .empty {
      text-align: center;
      padding: 40px 16px;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span {
      font-size: 0.8rem;
      color: #6b7280;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #6b7280;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .clear-btn:hover {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>To-Do List</h1>
      <div class="stats" id="stats">0 tasks remaining</div>
    </header>

    <div class="input-area">
      <input type="text" id="new-todo" placeholder="What needs to be done?" maxlength="200">
      <button onclick="addTodo()">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>

    <div class="footer">
      <span id="footer-count"></span>
      <button class="clear-btn" onclick="clearDone()">Clear completed</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';
    let nextId = todos.length ? Math.max(...todos.map(t => t.id)) + 1 : 1;

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todo-list');
      const remaining = todos.filter(t => !t.done).length;
      const done = todos.filter(t => t.done).length;

      document.getElementById('stats').textContent =
        `${remaining} task${remaining !== 1 ? 's' : ''} remaining`;
      document.getElementById('footer-count').textContent =
        `${done} completed`;

      const visible = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (visible.length === 0) {
        list.innerHTML = `<div class="empty">
          ${filter === 'done' ? 'No completed tasks yet.' :
            filter === 'active' ? 'Nothing left to do!' :
            'Add a task above to get started.'}
        </div>`;
        return;
      }

      list.innerHTML = visible.map(todo => `
        <li class="todo-item ${todo.done ? 'done' : ''}" id="item-${todo.id}">
          <input type="checkbox" ${todo.done ? 'checked' : ''}
            onchange="toggleTodo(${todo.id})">
          <span class="todo-text">${escapeHtml(todo.text)}</span>
          <button class="delete-btn" onclick="deleteTodo(${todo.id})" title="Delete">&#x2715;</button>
        </li>
      `).join('');
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: nextId++, text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.done = !todo.done;
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
